services:
  - type: web
    name: suppcheck-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: CHROMA_DB_PATH
        value: ./chroma_db
      - key: SEARCH_MIN_SIM
        value: "0.35"
      - key: DEBUG
        value: "false"