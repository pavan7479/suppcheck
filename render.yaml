services:
  - type: web
    name: suppcheck-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/download_model.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: CHROMA_DB_PATH
        value: ./chroma_db
      - key: SEARCH_MIN_SIM
        value: "0.35"
      - key: DEBUG
        value: "false"